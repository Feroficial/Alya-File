<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 Subir Documentos - WhatsApp Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #075E54, #128C7E);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #075E54;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        
        .upload-area {
            border: 2px dashed #128C7E;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: #f9f9f9;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            background: #e8f5e9;
            border-color: #075E54;
        }
        
        .upload-area.drag-over {
            background: #c8e6d9;
            border-color: #075E54;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .upload-label {
            cursor: pointer;
            font-size: 1.2rem;
            color: #075E54;
        }
        
        .upload-label span {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
        }
        
        .file-list {
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .file-item {
            background: #f0f0f0;
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .file-info {
            flex: 1;
        }
        
        .file-name {
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }
        
        .file-size {
            font-size: 0.75rem;
            color: #666;
        }
        
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        
        .delete-btn:hover {
            background: #c82333;
            transform: scale(1.05);
        }
        
        .btn-subir {
            width: 100%;
            background: linear-gradient(135deg, #075E54, #128C7E);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-subir:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(7,94,84,0.3);
        }
        
        .btn-subir:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
            display: none;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #075E54, #128C7E);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .badge {
            display: inline-block;
            background: #075E54;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }
        
        .info-box {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            border-left: 4px solid #075E54;
        }
        
        .info-box strong {
            color: #075E54;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 WhatsApp Bot</h1>
        <div class="subtitle">Sube documentación, códigos y configuraciones</div>
        
        <div class="info-box">
            <strong>📌 Tipos de archivo permitidos:</strong><br>
            JSON, TXT, JS, PDF, ZIP, LOG, ENV, MD<br>
            <strong>📅 Los archivos se guardan localmente</strong>
        </div>
        
        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" multiple accept=".json,.txt,.js,.pdf,.zip,.log,.env,.md,.jsx,.ts">
            <label for="fileInput" class="upload-label">
                <span>📁</span>
                Haz clic o arrastra archivos aquí
            </label>
            <div class="hint" style="font-size: 0.75rem; color: #999; margin-top: 10px;">
                Máx 5 archivos | Hasta 10MB por archivo
            </div>
        </div>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill">0%</div>
        </div>
        
        <div id="message" class="message"></div>
        
        <div class="file-list" id="fileList">
            <div style="text-align: center; color: #999; padding: 20px;">
                No hay archivos seleccionados
            </div>
        </div>
        
        <button class="btn-subir" id="uploadBtn" disabled>📤 Subir documentos al bot</button>
    </div>
    
    <script>
        // Array para almacenar archivos seleccionados
        let selectedFiles = [];
        
        // Elementos del DOM
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileListDiv = document.getElementById('fileList');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const messageDiv = document.getElementById('message');
        
        // Prevenir comportamiento por defecto del drag & drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });
        
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        // Highlight al arrastrar
        ['dragenter', 'dragover'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.classList.add('drag-over');
            });
        });
        
        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.classList.remove('drag-over');
            });
        });
        
        // Manejar drop de archivos
        uploadArea.addEventListener('drop', handleDrop);
        fileInput.addEventListener('change', handleFileSelect);
        
        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }
        
        function handleFileSelect(e) {
            const files = e.target.files;
            handleFiles(files);
        }
        
        function handleFiles(files) {
            const validExtensions = ['.json', '.txt', '.js', '.pdf', '.zip', '.log', '.env', '.md', '.jsx', '.ts'];
            
            for (let file of files) {
                // Validar extensión
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                if (!validExtensions.includes(ext)) {
                    showMessage(`❌ ${file.name} no es válido. Solo: ${validExtensions.join(', ')}`, 'error');
                    continue;
                }
                
                // Validar tamaño (10MB)
                if (file.size > 10 * 1024 * 1024) {
                    showMessage(`❌ ${file.name} excede 10MB`, 'error');
                    continue;
                }
                
                // Validar que no esté duplicado
                if (!selectedFiles.find(f => f.name === file.name && f.size === file.size)) {
                    selectedFiles.push(file);
                }
            }
            
            updateFileList();
            fileInput.value = ''; // Reset input
            
            if (selectedFiles.length > 5) {
                showMessage('⚠️ Máximo 5 archivos por lote', 'error');
                selectedFiles = selectedFiles.slice(0, 5);
                updateFileList();
            }
        }
        
        function updateFileList() {
            if (selectedFiles.length === 0) {
                fileListDiv.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">No hay archivos seleccionados</div>';
                uploadBtn.disabled = true;
                return;
            }
            
            uploadBtn.disabled = false;
            
            let html = '';
            selectedFiles.forEach((file, index) => {
                const sizeKB = (file.size / 1024).toFixed(1);
                const sizeDisplay = file.size > 1024 * 1024 ? (file.size / (1024 * 1024)).toFixed(2) + ' MB' : sizeKB + ' KB';
                
                html += `
                    <div class="file-item">
                        <div class="file-info">
                            <div class="file-name">${escapeHtml(file.name)} <span class="badge">${file.type.split('/')[1] || 'archivo'}</span></div>
                            <div class="file-size">${sizeDisplay}</div>
                        </div>
                        <button class="delete-btn" onclick="removeFile(${index})">🗑️</button>
                    </div>
                `;
            });
            fileListDiv.innerHTML = html;
        }
        
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
            if (selectedFiles.length === 0) {
                showMessage('Todos los archivos fueron eliminados', 'success');
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showMessage(msg, type) {
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 4000);
        }
        
        // Subir archivos (simulación + localStorage)
        uploadBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;
            
            progressBar.style.display = 'block';
            uploadBtn.disabled = true;
            
            // Simular subida con progreso
            for (let i = 0; i <= 100; i += 10) {
                await new Promise(resolve => setTimeout(resolve, 100));
                progressFill.style.width = i + '%';
                progressFill.textContent = i + '%';
            }
            
            // Guardar en localStorage (simulación de base de datos local)
            const documents = JSON.parse(localStorage.getItem('whatsapp_bot_docs') || '[]');
            
            for (let file of selectedFiles) {
                const reader = new FileReader();
                
                await new Promise((resolve) => {
                    reader.onload = function(e) {
                        documents.push({
                            id: Date.now() + Math.random(),
                            name: file.name,
                            type: file.type,
                            size: file.size,
                            content: e.target.result.split(',')[1] || '', // Base64
                            uploadDate: new Date().toISOString(),
                            expiresIn: '60 días'
                        });
                        resolve();
                    };
                    reader.readAsDataURL(file);
                });
            }
            
            localStorage.setItem('whatsapp_bot_docs', JSON.stringify(documents));
            
            // Resetear
            setTimeout(() => {
                progressBar.style.display = 'none';
                progressFill.style.width = '0%';
                progressFill.textContent = '0%';
                
                showMessage(`✅ ¡Éxito! ${selectedFiles.length} documento(s) guardado(s). Expiran en 60 días.`, 'success');
                
                selectedFiles = [];
                updateFileList();
                uploadBtn.disabled = false;
                
                // Mostrar resumen
                const totalDocs = JSON.parse(localStorage.getItem('whatsapp_bot_docs') || '[]').length;
                console.log(`Total documentos del bot: ${totalDocs}`);
            }, 500);
        });
        
        // Mostrar documentos guardados al cargar
        window.addEventListener('load', () => {
            const docs = JSON.parse(localStorage.getItem('whatsapp_bot_docs') || '[]');
            if (docs.length > 0) {
                showMessage(`📚 Tienes ${docs.length} documento(s) guardados en el bot`, 'success');
            }
        });
    </script>
</body>
</html>
